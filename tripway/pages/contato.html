<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TripWay - Contato</title>
</head>
<body>
 
  <header>
    <img src="https://cdn.vectorstock.com/i/preview-1x/85/73/travel-symbol-icon-vector-30538573.jpg" alt="Logo TripWay" width="180">
    <h1>Contato e Reserva</h1>
 
    <nav>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="destinos.html">Destinos</a></li>
        <li><a href="pacotes.html">Pacotes</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </nav>
  </header>
 
  <main>
 
    <section>
      <h2>Faça sua reserva</h2>
      <img src="https://mlimqmwm49de.i.optimole.com/w:930/h:620/q:mauto/rt:fill/g:ce/f:best/https://blog.leadscard.com.br/wp-content/uploads/2023/07/Gerenciamento-de-contatos.png" alt="Imagem de contato e reserva de viagens" width="300">
    </section>
 
    <section>
      <form action="#" method="post">
 
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome" required><br><br>
 
        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email" required><br><br>
 
        <label for="destino">Destino de interesse:</label><br>
        <select id="destino" name="destino" required>
          <option value="">Selecione</option>
          <option value="praia">Praia do Sonhos </option>
          <option value="montanha">Pico das Neves </option>
          <option value="cidade">Cidade dos Anjos </option>
        </select><br><br>
 
        <label for="data">Data da viagem:</label><br>
        <input type="date" id="data" name="data" required><br><br>
 
        <label for="quantidade">Número de pessoas:</label><br>
        <input type="number" id="quantidade" name="quantidade" min="1" required><br><br>
 
        <label for="mensagem">Mensagem:</label><br>
        <textarea id="mensagem" name="mensagem" rows="5" cols="30" required></textarea><br><br>
 
        <button type="submit">Enviar solicitação</button>
 
      </form>
    </section>
 
  </main>
 
  <footer>
    <p>&copy; 2025 TripWay - Todos os direitos reservados</p>
  </footer>
 
</body>
</html>
