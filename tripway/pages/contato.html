<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TripWay - Contato</title>
</head>
<body style="font-family: 'Poppins', sans-serif;">
 
  <header>
    <img src="https://cdn.vectorstock.com/i/preview-1x/85/73/travel-symbol-icon-vector-30538573.jpg" alt="Logo TripWay" width="180">
    <h1>Contato e Reserva</h1>
 
    <nav>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="destinos.html">Destinos</a></li>
        <li><a href="pacotes.html">Pacotes</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </nav>
  </header>
 
  <main>
 
    <section>
      <h2>Faça sua reserva</h2>
      <img src="https://img.freepik.com/fotos-gratis/estou-aqui-para-ajuda-lo-com-sua-reserva-e-duvidas-de-viagem-agente-de-vendas-feminino-segurando-passagens-de-aviao-enquanto-sorri-e-faz-contato-visual-na-agencia-de-viagens_662251-2371.jpg?semt=ais_hybrid&w=740&q=80" alt="Imagem de contato e reserva de viagens" width="300">
    </section>
 
    <section>
      <form action="#" method="post">
 
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome" required><br><br>
 
        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email" required><br><br>
 
        <label for="destino">Destino de interesse:</label><br>
        <select id="destino" name="destino" required>
          <option value="">Selecione</option>
          <option value="praia">Praia de Ilha Bela Brasil </option>
          <option value="montanha">Appalachian Trail Estados Unidos </option>
          <option value="cidade">Londres Capital da Inglaterra </option>
        </select><br><br>
 
        <label for="data">Data da viagem:</label><br>
        <input type="date" id="data" name="data" required><br><br>
 
        <label for="quantidade">Número de pessoas:</label><br>
        <input type="number" id="quantidade" name="quantidade" min="1" required><br><br>
 
        <label for="mensagem">Mensagem:</label><br>
        <textarea id="mensagem" name="mensagem" rows="5" cols="30" required></textarea><br><br>
 
        <button type="submit">Enviar solicitação</button>
 
      </form>
    </section>
 
  </main>
 
  <footer style="background-color: lightblue; padding: 10px;">
  <center>
    <p><strong>TripWay</strong></p>
    <p>Explore o mundo com a gente 🌍✈️</p>
    <p>&copy; 2025 - Todos os direitos reservados</p>
  </center>
</footer>
 
</body>
</html>
